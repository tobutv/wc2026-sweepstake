<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FIFA World Cup 2026 — Sweepstake Live Table</title>
  <meta property="og:title" content="FIFA World Cup 2026 — Office Sweepstake">
  <meta property="og:description" content="Live office sweepstake league table.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tobutv.github.io/wc2026-sweepstake/">
  <meta name="theme-color" content="#1d0b38">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <header class="hdr">
      <span class="badge26">26</span>
      <h1>World Cup Sweepstake</h1>
      <span class="hosts" aria-hidden="true">🇨🇦 🇲🇽 🇺🇸</span>
    </header>
    <p class="sub" id="subline">Loading live league table…</p>

    <div id="live-banner" hidden></div>

    <section aria-label="League table">
      <div class="tablewrap">
        <table id="league">
          <thead>
            <tr>
              <th class="cpos" scope="col">#</th>
              <th class="cplayer" scope="col">Player</th>
              <th scope="col">P1</th><th scope="col">P2</th><th scope="col">P3</th>
              <th scope="col">P4</th><th scope="col">P5</th><th scope="col">P6</th>
              <th scope="col">Pts</th><th scope="col">Pld</th><th scope="col">GD</th>
              <th scope="col">GF</th><th scope="col">GA</th>
            </tr>
          </thead>
          <tbody id="league-body"></tbody>
        </table>
      </div>
      <p class="hint">Tap a player to see their teams &amp; points</p>
    </section>

    <section id="live-section" hidden aria-label="Live now">
      <h2>Live now</h2>
      <div class="cards" id="live-cards"></div>
    </section>

    <section aria-label="The story so far">
      <h2>The Story So Far</h2>
      <div class="story" id="story"></div>
    </section>

    <section aria-label="Today's fixtures">
      <h2>Today's fixtures</h2>
      <div class="cards" id="fixtures"></div>
    </section>

    <section aria-label="Recent results">
      <h2>Recent results</h2>
      <div class="cards" id="results"></div>
    </section>

    <section id="bracket-section" hidden aria-label="Knockout bracket">
      <h2>Knockout bracket</h2>
      <div class="bracket" id="bracket"></div>
      <p class="hint">Scroll sideways &middot; winners in green &middot; AET / PENS where it went the distance</p>
    </section>

    <footer class="foot" id="foot"></footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
